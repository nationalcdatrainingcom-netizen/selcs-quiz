services:
  - type: web
    name: leap-quiz
    env: node
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: ADMIN_PASSWORD
        generateValue: false
        value: leap2026
    disk:
      name: leap-data
      mountPath: /opt/render/project/src/data
      sizeGB: 1
